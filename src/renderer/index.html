<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K8s 调度器模拟沙盒</title>
  <link rel="stylesheet" href="styles.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    (function() {
      const fs = require('fs');
      const path = require('path');
      const rendererDir = path.dirname(decodeURIComponent(new URL(window.location.href).pathname));
      const jsxCode = fs.readFileSync(path.join(rendererDir, 'app.jsx'), 'utf8');
      const compiledCode = Babel.transform(jsxCode, { presets: ['react'] }).code;
      const script = document.createElement('script');
      script.textContent = compiledCode;
      document.head.appendChild(script);
    })();
  </script>
</body>
</html>
